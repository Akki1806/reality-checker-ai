openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: analyze
    description: Goal analysis operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /analyze:
    post:
      operationId: analyzeGoal
      tags: [analyze]
      summary: Analyze a goal for feasibility
      description: Evaluates a user-submitted goal and returns feasibility rating, reasoning, and a suggested plan
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnalyzeGoalBody"
      responses:
        "200":
          description: Analysis result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalysisResult"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    AnalyzeGoalBody:
      type: object
      properties:
        goal:
          type: string
          description: The user's goal to analyze
        brutalHonesty:
          type: boolean
          description: Whether to apply brutal honesty mode
      required:
        - goal
        - brutalHonesty
    AnalysisResult:
      type: object
      properties:
        feasibility:
          type: string
          enum: [Realistic, Risky, Unrealistic]
          description: The feasibility rating of the goal
        realityScore:
          type: integer
          minimum: 0
          maximum: 100
          description: Numeric score from 0–100 (0–30 Unrealistic, 31–60 Risky, 61–100 Realistic)
        scoreReason:
          type: string
          description: Short explanation of why this specific score was assigned
        category:
          type: string
          enum: [money, fitness, career, business, other]
          description: Detected category of the goal
        reason:
          type: array
          items:
            type: string
          maxItems: 3
          description: 2–3 key factors behind the feasibility rating as bullet points
        plan:
          type: array
          items:
            type: string
          maxItems: 4
          description: Up to 4 concise actionable steps
      required:
        - feasibility
        - realityScore
        - scoreReason
        - category
        - reason
        - plan
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error
